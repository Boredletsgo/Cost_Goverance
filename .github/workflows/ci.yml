name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lite dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all modules
        run: python -m compileall app

      - name: Validate mock connector datasets (JSON)
        run: |
          python - <<'PY'
          import glob, json
          files = glob.glob("app/connectors/data/**/*.json", recursive=True)
          for f in files:
              json.load(open(f, encoding="utf-8"))
          print(f"OK: {len(files)} JSON datasets parsed")
          PY

      - name: Import smoke test (app boots with mock provider + SQLite)
        env:
          AI_PROVIDER: mock
          DATABASE_URL: sqlite:///./.data/inframind.db
        run: python -c "import app.main; print('app imports OK')"

      - name: CLI init-db + seed smoke test
        env:
          AI_PROVIDER: mock
          DATABASE_URL: sqlite:///./.data/inframind.db
        run: |
          python -m app.cli init-db
          python -m app.cli seed

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
