name: inframind

services:
  postgres:
    image: postgres:16-alpine
    container_name: inframind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inframind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inframind}
      POSTGRES_DB: ${POSTGRES_DB:-inframind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inframind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: inframind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inframind-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inframind}:${POSTGRES_PASSWORD:-inframind}@postgres:5432/${POSTGRES_DB:-inframind}
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /data/chroma
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m app.cli init-db &&
             python -m app.cli seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inframind-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inframind}:${POSTGRES_PASSWORD:-inframind}@postgres:5432/${POSTGRES_DB:-inframind}
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /data/chroma
    volumes:
      - ./backend:/app
      - chroma_data:/data/chroma
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inframind-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  chroma_data:
